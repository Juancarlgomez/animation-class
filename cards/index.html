<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Cards</title>
</head>
<body>
    <div class="container">
        <h1>Cards</h1>
        <div class="card">
            <img src="img/arches_national_park.jpg" alt="Card 1">
            <h3>Arches National Park</h3>
            <p>Arches National Park is a unique landscape of over 2,000 natural stone arches.</p>
        </div>
        <div class="card">
            <img src="img/bryce_canyon.jpg" alt="Card 2">
            <h3>Bryce Canyon</h3>
            <p>Bryce Canyon is a scenic area known for its hoodoos and colorful rock formations.</p>
        </div>
        <div class="card">
            <img src="img/park_city_mountains.jpg" alt="Card 3">
            <h3>Park City Mountains</h3>
            <p>Park City Mountains offer stunning views and recreational opportunities.</p>
        </div>
    </div>
    
</body>
</html>
